author: Swachchhanda Shrawan Poudel (Nextron Systems)
custom:
  wazuh_rule_id: 200233
date: 2025-03-19
description: "Detects exploitation of LNK file command-line length discrepancy, where\
  \ attackers hide malicious commands beyond the 260-character UI limit while the\
  \ actual command-line argument field supports 4096 characters using whitespace padding\
  \ (e.g., 0x20, 0x09-0x0D).\nAdversaries insert non-printable whitespace characters\
  \ (e.g., Line Feed \\x0A, Carriage Return \\x0D) to pad the visible section of the\
  \ LNK file, pushing malicious commands past the UI-visible boundary.\nThe hidden\
  \ payload, executed at runtime but invisible in Windows Explorer properties, enables\
  \ stealthy execution and evasion\u2014commonly used for social engineering attacks.\n\
  This rule flags suspicious use of such padding observed in real-world attacks.\n"
detection:
  condition: all of selection_*
  selection_cmd:
  - CommandLine|contains:
    - '                 '
    - \u0009
    - \u000A
    - \u0011
    - \u0012
    - \u0013
    - \u000B
    - \u000C
    - \u000D
  - CommandLine|re: \n\n\n\n\n\n
  selection_img:
  - ParentImage|endswith: \explorer.exe
  - ParentCommandLine|contains: .lnk
falsepositives:
- Unknown
id: dd8756e7-a3a0-4768-b47e-8f545d1a751c
level: high
logsource:
  category: process_creation
  product: windows
references:
- https://syedhasan010.medium.com/forensics-analysis-of-an-lnk-file-da68a98b8415
- https://thehackernews.com/2025/03/unpatched-windows-zero-day-flaw.html
- https://www.trendmicro.com/en_us/research/25/c/windows-shortcut-zero-day-exploit.html
status: experimental
tags:
- attack.initial-access
- attack.execution
- attack.t1204.002
title: Suspicious LNK Command-Line Padding with Whitespace Characters
