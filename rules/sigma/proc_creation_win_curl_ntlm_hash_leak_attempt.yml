author: Swachchhanda Shrawan Poudel (Nextron Systems)
custom:
  wazuh_rule_id: 201052
date: 2026-06-04
description: "Detects the use of curl with NTLM authentication and empty credentials\
  \ (-u :), which can be abused to leak the currently logged-in user's NTLMv2 challenge-response\
  \ to an\nattacker-controlled server, enabling offline cracking or relay attacks.\n\
  When no credentials are provided, the Microsoft-shipped curl passes a NULL identity\
  \ to Windows SSPI, which automatically falls back to the current user's logon session\
  \ credentials\nstored in LSASS \u2014 without requiring a plaintext password.\n\
  This behavior is exclusive to the curl binary shipped by Microsoft (available since\
  \ Windows 10 / Windows Server 2019), which is built with SSPI support.\n"
detection:
  condition: all of selection_*
  selection_empty_creds:
    CommandLine|re: '(?i)\s(-u|--user)\s*:'
  selection_img:
  - Image|endswith: \curl.exe
  - OriginalFileName: curl.exe
  selection_ntlm_flag:
    CommandLine|contains: --ntlm
falsepositives:
- Should be very rare as it's not widely known or used, but could occur in legitimate
  use cases where curl is used with NTLM authentication and empty credentials, such
  as in certain scripts or automation tasks.
id: 916eb839-895e-47f8-99ee-3008bf377a3e
level: high
logsource:
  category: process_creation
  product: windows
references:
- https://github.com/curl/curl/blob/master/lib/vauth/ntlm_sspi.c#L128-L140
- https://learn.microsoft.com/en-us/windows/win32/secauthn/acquirecredentialshandle--ntlm
- https://curl.se/docs/manpage.html#--ntlm
regression_tests_path: regression_data/rules/windows/process_creation/proc_creation_win_curl_ntlm_hash_leak_attempt/info.yml
status: test
tags:
- attack.credential-access
- attack.t1187
title: NTLM Hash Leak Via Curl NTLM Authentication
